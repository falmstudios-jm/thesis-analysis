<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Analysis - Jonas Thesis</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
            --accent: #38bdf8; --accent2: #818cf8; --green: #4ade80;
            --text: #e2e8f0; --muted: #94a3b8; --border: #475569;
            --red: #f87171; --yellow: #fbbf24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 24px; position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .header h1 { font-size: 1.3em; color: var(--accent); }
        .header p { font-size: 0.82em; color: var(--muted); margin-top: 2px; }
        .header-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .sync-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 6px; font-size: 0.78em; font-weight: 600;
        }
        .sync-status.ok { background: rgba(74,222,128,0.15); color: var(--green); }
        .sync-status.pending { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .sync-status.error { background: rgba(248,113,113,0.15); color: var(--red); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
        .sync-status.ok .sync-dot { background: var(--green); }
        .sync-status.pending .sync-dot { background: var(--yellow); }
        .sync-status.error .sync-dot { background: var(--red); }

        .tabs {
            display: flex; gap: 4px; padding: 12px 24px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            overflow-x: auto; position: sticky; top: 80px; z-index: 99;
        }
        .tab {
            padding: 10px 16px; background: transparent; border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; border-radius: 8px;
            font-size: 0.83em; white-space: nowrap; transition: all 0.2s;
        }
        .tab:hover { background: var(--surface2); color: var(--text); }
        .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
        .tab .st { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 5px; }
        .tab .st.done { background: var(--green); }
        .tab .st.partial { background: var(--yellow); }

        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .panel { display: none; }
        .panel.active { display: block; }

        .card {
            background: var(--surface); border-radius: 12px; padding: 20px;
            margin-bottom: 16px; border: 1px solid var(--border);
        }
        .card h2 { font-size: 1.05em; color: var(--accent); margin-bottom: 12px; }
        .card h3 { font-size: 0.95em; color: var(--accent2); margin: 16px 0 8px; }

        .prefilled-box {
            background: var(--bg); border-left: 3px solid var(--accent2); border-radius: 8px;
            padding: 14px; margin-bottom: 16px; font-size: 0.85em; line-height: 1.6;
            white-space: pre-wrap; color: var(--muted);
        }
        .prefilled-label {
            font-size: 0.72em; font-weight: 600; color: var(--accent2);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }

        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 0.85em; font-weight: 500; }

        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.9em; font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        textarea { min-height: 100px; resize: vertical; }
        textarea.big { min-height: 150px; }

        .reel-card {
            background: var(--bg); border-radius: 10px; padding: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
        }
        .reel-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .reel-num {
            background: var(--accent); color: var(--bg); width: 28px; height: 28px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.8em; font-weight: 700; flex-shrink: 0;
        }
        .reel-header span { font-size: 0.9em; color: var(--muted); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }

        .btn {
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 0.85em; font-weight: 600; transition: all 0.2s;
        }
        .btn-accent { background: var(--accent); color: var(--bg); }
        .btn-green { background: var(--green); color: var(--bg); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }

        .progress { background: var(--bg); border-radius: 10px; height: 6px; margin: 8px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 10px; transition: width 0.4s; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            background: var(--green); color: var(--bg); border-radius: 8px;
            font-weight: 600; font-size: 0.9em; opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .toast.err { background: var(--red); }

        .setup-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .setup-box {
            background: var(--surface); border-radius: 16px; padding: 32px;
            max-width: 500px; width: 100%; border: 1px solid var(--border);
        }
        .setup-box h2 { color: var(--accent); margin-bottom: 8px; }
        .setup-box p { color: var(--muted); font-size: 0.9em; margin-bottom: 16px; line-height: 1.5; }
        .hidden { display: none !important; }

        .overview-card {
            background: var(--surface); border-radius: 12px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 12px;
        }
        .overview-card h3 { color: var(--accent); margin-bottom: 4px; font-size: 1em; }
        .overview-card .sub { color: var(--muted); font-size: 0.82em; margin-bottom: 8px; }

        .hint { font-size: 0.78em; color: var(--muted); font-style: italic; margin-bottom: 8px; }

        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag {
            padding: 7px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 20px; cursor: pointer; font-size: 0.82em; transition: all 0.2s;
            user-select: none;
        }
        .tag:hover { border-color: var(--accent); }
        .tag.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .tag.on-purple { background: var(--accent2); color: white; border-color: var(--accent2); }

        .radio-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .radio-pill {
            padding: 7px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 20px; cursor: pointer; font-size: 0.82em; transition: all 0.2s;
            user-select: none;
        }
        .radio-pill:hover { border-color: var(--accent); }
        .radio-pill.on { background: var(--green); color: var(--bg); border-color: var(--green); }

        .mini-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        @media (max-width: 640px) { .mini-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="setup-modal hidden" id="setupModal">
    <div class="setup-box">
        <h2>Connect to GitHub</h2>
        <p>Enter a GitHub token to sync your data. Needs <strong>repo</strong> scope.<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=thesis-analysis" target="_blank" style="color:var(--accent)">Create token here</a></p>
        <div class="form-group">
            <label>GitHub Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-accent" onclick="saveToken()">Connect</button>
            <button class="btn btn-ghost" onclick="skipToken()">Use Offline</button>
        </div>
    </div>
</div>

<div class="header">
    <div class="header-top">
        <div>
            <h1>Creator Analysis</h1>
            <p>Jonas - Analyze 8 reels per creator + write your observations</p>
        </div>
        <div class="sync-status pending" id="syncStatus">
            <span class="sync-dot"></span>
            <span id="syncText">...</span>
        </div>
    </div>
    <div class="header-actions">
        <button class="btn btn-green" onclick="syncToGithub()">Save to GitHub</button>
        <button class="btn btn-accent" onclick="syncFromGithub()">Load from GitHub</button>
        <button class="btn btn-ghost" onclick="exportJSON()">Export JSON</button>
        <button class="btn btn-ghost" onclick="showSetup()">Settings</button>
    </div>
</div>

<div class="tabs" id="tabs">
    <button class="tab active" onclick="showTab('overview')">Overview</button>
</div>

<div class="container" id="main"></div>

<div class="toast" id="toast"></div>

<script>
const REPO_OWNER = 'falmstudios-jm';
const REPO_NAME = 'thesis-analysis';
const DATA_FILE = 'data.json';
const BRANCH = 'master';

const CREATORS = [
    { id: 'paula', handle: '@deutsch.frag.paula', name: 'Paulina Boinska', ig: '~194K' },
    { id: 'ania', handle: '@ania_germania', name: 'Anna Mazurek', ig: '~78K' },
    { id: 'lucy', handle: '@deutsch.mit.lucy', name: '\u0141ucja B\u0142aszczyk', ig: '~31K' },
    { id: 'olivia', handle: '@_szprechaj', name: 'Olivia Miku\u0142a', ig: '~22.5K' },
    { id: 'natalia', handle: '@niemieckizprzyjemnoscia', name: 'Natalia Kamysz', ig: '~11K' }

// Pre-filled research (read-only context for Jonas)
const RESEARCH = {
    paula: {
        bio: 'Display name: "Paulina Boinska | B1 Deutschkurs & Pr\u00fcfung"\nDescribes herself as "Lehrerin f\u00fcr Deutsch und Polnisch"\nAssociated with "Language & Progress"',
        platforms: 'TikTok: @deutsch.frag.paula (active, A1-B1 content)\nFacebook: Language & Progress Fremdsprachenakademie\nPersonal IG: @paulinaboinska\nNo YouTube found',
        credentials: 'Runs BAMF-approved language school in Frankfurt (language-progress.de)\nHessian quality seal (Qualit\u00e4tssiegel Hessen)\nCo-founded Language & Progress in 2015\nClaims "19 years experience, 15k+ students taught" (verify on IG)\nNo formal academic degree displayed anywhere',
        commercial: 'Language & Progress Fremdsprachenakademie, Frankfurt\nGerman integration courses, corporate training\nLanguages: DE, EN, PL, IT, ES, CN, AR, JP\nFormats: individual, partner, group',
        notes: 'Based in FRANKFURT, GERMANY (not Poland!) - only creator not based in Poland'
    },
    ania: {
        bio: 'Display name: "Anna Mazurek | NIEMIECKI | kursy online"\n"Nauczycielka niemieckiego z pasj\u0105" (German teacher with passion)\nOwner of language school, own textbooks, 3000+ students',
        platforms: 'TikTok: @ania_germania\nFacebook: ~32,500 likes (cjo.germania)\nIG school: @cjo.germania (~1,129 followers)\nThreads: @ania_germania\nLinkedIn: "Dyrektor i metodyk szko\u0142y j\u0119zykowej"\nNo YouTube found',
        credentials: 'Studied at Uniwersytet Opolski (likely Germanistyka) - from LinkedIn\nDirector & methodology specialist of CJO GERMANIA\nOwns registered language school in Rybnik\nOwn textbooks ("autorskie podr\u0119czniki")\nNo formal credentials visible on Instagram',
        commercial: 'School: CJO GERMANIA, Rybnik (Energetyk\u00f3w 109E)\nOnline + in-person group courses (4-6 people)\nWebsite: cjogermania.pl',
        notes: 'Has institutional backing (registered school) vs pure influencer'
    },
    lucy: {
        bio: 'Display name: "NIEMIECKI OD PODSTAW | \u0141ucja B\u0142aszczyk"\nLived in Vienna 11+ years\nTeaches practical everyday German for Polish speakers',
        platforms: 'TikTok: @deutsch.mit.lucy\nFacebook: deutsch.mit.lucy (Vienna)\nSpotify: "Deutsch Mit Lucy" podcast (beginner stories)\nLinktree: linktr.ee/deutsch.mit.lucy\ne-korepetycje.net: 150 PLN/60 min',
        credentials: 'No formal academic credentials on any platform\nClaims ~15 years teaching experience\n11+ years in Vienna\nPublished book: "Odkryj niemiecki" (2024, Altenberg, 512p, A1-B1)\nBook rated 9.7/10 on Lubimyczyta\u0107.pl',
        commercial: 'Website: deutschmitlucy.eu\nCourse: "Niemiecki Start" (beginners)\nBook: 149.99 PLN\nTutoring: 150 PLN/60 min',
        notes: 'Based in VIENNA, AUSTRIA. Authority from immersion + published book, not formal education'
    },
    olivia: {
        bio: 'Display name: "niemiecki online"\n"Native speakerka z j\u0119zyka niemieckiego"\nOwner of language school, translator, instructor\nGerman C2 per LinkedIn',
        platforms: 'TikTok: @szprechaj\nFacebook: "Szprechaj - Olivia Miku\u0142a" (Cz\u0119stochowa)\nLinkedIn: Owner/translator/instructor\nNo YouTube found',
        credentials: '"Native speaker" - primary authority claim (15 years in Germany)\nTeaches at Jagiellonian University (per website)\nGerman C2 level (LinkedIn)\nNo formal degree or DaF/DaZ certification found\n"1000+ clients" claim (verify on IG)',
        commercial: 'Studio J\u0119zykowe Native Creative (szprechaj.pl)\nCz\u0119stochowa + online\nIndividual: 100-140 PLN/55 min\nPair: 60-100 PLN/person\nGroup: 45 PLN/person (3-5 people)\nGeneral/Business/Exam prep (A1-C2)',
        notes: '"Szprechaj" = playful Polonization of German "sprechen". Claims native speaker status through residence, not birth'
    },
    natalia: {
        bio: 'Display name: "Natalia Kamysz | Niemiecki z Przyjemno\u015bci\u0105"\n~651 posts',
        platforms: 'YouTube MAIN: "Niemiecki? Z przyjemno\u015bci\u0105!" (~77K subs, 1000+ videos, 27M views, since 2014)\nYouTube 2nd: "Szko\u0142a j\u0119zyka niemieckiego"\nTikTok: @niemieckizprzyjemnoscia\nFacebook: niemieckizprzyjemnoscia\nSpotify: "Niemiecki z przyjemno\u015bci\u0105" podcast\nLinkedIn: Owner',
        credentials: 'GERMAN PHILOLOGY degree - University of Gda\u0144sk \u2705\n\u2192 ONLY creator with verifiable formal academic credentials!\n~15 years in education\nPublished book: "J\u0119zyk niemiecki dla opiekun\u00f3w os\u00f3b starszych" (Wydawnictwo S\u0142\u00f3wko)\nAdditional e-books and courses',
        commercial: 'Website: niemieckizprzyjemnoscia.com\nCourses A0-B1: 149-279 PLN\n"Zacznij m\u00f3wi\u0107 w 60 dni!" - 169 PLN\nE-books, exercises\nBook at PWN/Empik',
        notes: 'Based in Tczew, Poland. STRONGEST formal credentials of all 5 creators. Full name: Natalia Kamysz Grosz. Biggest YouTube presence by far.'
    }
};

// ===== GITHUB SYNC =====
let ghToken = localStorage.getItem('gh_token') || '';
let fileSha = null;

function getHeaders() {
    return { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}

async function syncFromGithub() {
    if (!ghToken) { showSetup(); return; }
    setSyncStatus('pending', 'Loading...');
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}?ref=${BRANCH}`, { headers: getHeaders() });
        if (res.status === 404) { setSyncStatus('ok', 'No saved data yet'); return; }
        if (!res.ok) throw new Error('API error: ' + res.status);
        const json = await res.json();
        fileSha = json.sha;
        const content = JSON.parse(atob(json.content.replace(/\n/g, '')));
        localStorage.setItem('thesis_data', JSON.stringify(content));
        applyData(content);
        setSyncStatus('ok', 'Loaded');
        showToast('Loaded from GitHub');
    } catch (e) {
        setSyncStatus('error', 'Load failed');
        showToast('Error: ' + e.message, true);
    }
}

async function syncToGithub() {
    if (!ghToken) { showSetup(); return; }
    const data = collectData();
    data._lastSaved = new Date().toISOString();
    setSyncStatus('pending', 'Saving...');
    try {
        const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}?ref=${BRANCH}`, { headers: getHeaders() });
        if (getRes.ok) fileSha = (await getRes.json()).sha;
        else if (getRes.status !== 404) throw new Error('API error: ' + getRes.status);

        const body = {
            message: 'Update analysis - ' + new Date().toLocaleString(),
            content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
            branch: BRANCH
        };
        if (fileSha) body.sha = fileSha;

        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
            method: 'PUT', headers: getHeaders(), body: JSON.stringify(body)
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.status); }
        fileSha = (await res.json()).content.sha;
        setSyncStatus('ok', 'Saved');
        showToast('Saved to GitHub!');
    } catch (e) {
        setSyncStatus('error', 'Save failed');
        showToast('Error: ' + e.message, true);
    }
}

function setSyncStatus(s, t) {
    document.getElementById('syncStatus').className = 'sync-status ' + s;
    document.getElementById('syncText').textContent = t;
}
function showSetup() { document.getElementById('setupModal').classList.remove('hidden'); }
function saveToken() {
    ghToken = document.getElementById('tokenInput').value.trim();
    if (ghToken) { localStorage.setItem('gh_token', ghToken); document.getElementById('setupModal').classList.add('hidden'); syncFromGithub(); }
}
function skipToken() { document.getElementById('setupModal').classList.add('hidden'); setSyncStatus('pending', 'Offline'); }

// ===== BUILD UI =====
const mainEl = document.getElementById('main');
const tabsEl = document.getElementById('tabs');

// Overview panel
let html = '<div class="panel active" id="panel-overview">';
html += '<div class="card"><h2>How to use this</h2><p style="color:var(--muted);font-size:0.9em;line-height:1.6">';
html += '1. Click on a creator tab<br>';
html += '2. Read the pre-filled research (purple boxes) - this is already done for you<br>';
html += '3. Copy their exact Instagram bio<br>';
html += '4. Analyze 8 of their reels (describe what you see)<br>';
html += '5. Write your overall impression at the bottom<br>';
html += '6. Click "Save to GitHub" when done</p></div>';
CREATORS.forEach(c => {
    html += `<div class="overview-card"><h3>${c.name}</h3>`;
    html += `<div class="sub">${c.handle} &middot; ${c.ig} followers</div>`;
    html += `<div class="progress"><div class="progress-fill" id="oprog-${c.id}" style="width:0%"></div></div>`;
    html += `<button class="btn btn-accent" style="margin-top:8px" onclick="showTab('${c.id}')">Start</button></div>`;
});
html += '</div>';

// Creator panels
CREATORS.forEach(c => {
    const r = RESEARCH[c.id];
    html += `<div class="panel" id="panel-${c.id}">`;
    html += `<h2 style="color:var(--accent);margin-bottom:4px">${c.name}</h2>`;
    html += `<p style="color:var(--muted);font-size:0.85em;margin-bottom:16px">${c.handle} &middot; ${c.ig} followers</p>`;
    html += `<div class="progress"><div class="progress-fill" id="prog-${c.id}" style="width:0%"></div></div>`;
    html += `<p style="color:var(--muted);font-size:0.78em;text-align:right;margin-bottom:16px" id="progtxt-${c.id}">0%</p>`;

    // Section 1: Pre-filled research (read-only)
    html += `<div class="card"><h2>Research (pre-filled - just read)</h2>`;
    html += `<div class="prefilled-label">Bio & Self-Description</div><div class="prefilled-box">${esc(r.bio)}</div>`;
    html += `<div class="prefilled-label">Other Platforms</div><div class="prefilled-box">${esc(r.platforms)}</div>`;
    html += `<div class="prefilled-label">Credentials & Qualifications</div><div class="prefilled-box">${esc(r.credentials)}</div>`;
    html += `<div class="prefilled-label">Commercial Model</div><div class="prefilled-box">${esc(r.commercial)}</div>`;
    if (r.notes) { html += `<div class="prefilled-label">Important Note</div><div class="prefilled-box" style="border-color:var(--yellow)">${esc(r.notes)}</div>`; }
    html += `</div>`;

    // Section 2: Jonas fills in bio
    html += `<div class="card"><h2>Step 1: Copy the Instagram Bio</h2>`;
    html += `<p class="hint">Go to their Instagram profile and copy-paste the exact bio text here.</p>`;
    html += `<div class="form-group"><label>Exact Bio Text (verbatim from Instagram)</label>`;
    html += `<textarea id="${c.id}_bio" class="big" onchange="autoSave()" placeholder="Copy-paste the entire bio text from their Instagram profile..."></textarea></div>`;
    html += `<div class="row">`;
    html += `<div class="form-group"><label>Follower Count (exact, as shown today)</label><input type="text" id="${c.id}_followers" onchange="autoSave()" placeholder="e.g. 194,231"></div>`;
    html += `<div class="form-group"><label>Total Posts</label><input type="text" id="${c.id}_posts" onchange="autoSave()" placeholder="e.g. 847"></div>`;
    html += `</div></div>`;

    // Section 3: 8 Reels
    html += `<div class="card"><h2>Step 2: Analyze 8 Reels</h2>`;
    html += `<p class="hint">Pick 8 recent reels. For each: what topic, what you see, likes/comments count, any errors.</p>`;
    for (let i = 1; i <= 8; i++) {
        html += `<div class="reel-card">`;
        html += `<div class="reel-header"><span class="reel-num">${i}</span><span>Reel #${i}</span></div>`;
        html += `<div class="mini-row">`;
        html += `<div class="form-group"><label>Date or Link</label><input type="text" id="${c.id}_r${i}_date" onchange="autoSave()" placeholder="Mar 15 / link"></div>`;
        html += `<div class="form-group"><label>Topic</label><input type="text" id="${c.id}_r${i}_topic" onchange="autoSave()" placeholder="e.g. Dativ"></div>`;
        html += `<div class="form-group"><label>Likes / Comments</label><input type="text" id="${c.id}_r${i}_engagement" onchange="autoSave()" placeholder="e.g. 2.4k / 38"></div>`;
        html += `</div>`;
        html += `<div class="form-group"><label>What happens? (teaching style, language, errors, your reaction)</label>`;
        html += `<textarea id="${c.id}_r${i}_notes" onchange="autoSave()" placeholder="Describe what you observe..."></textarea></div>`;
        html += `</div>`;
    }
    html += `</div>`;

    // Section 4: Quick structured tags (fast clicks)
    html += `<div class="card"><h2>Step 3: Quick Tags (just click what applies)</h2>`;
    html += `<p class="hint">These take 30 seconds - just click the ones that match. This helps with the comparative analysis.</p>`;

    html += `<div class="form-group"><label>Content language</label>`;
    html += `<div class="radio-row" id="${c.id}_lang_g">`;
    ['Mostly Polish','Mostly German','Mix of both'].forEach(o => {
        html += `<div class="radio-pill" data-g="${c.id}_lang" data-v="${o}" onclick="pickRadio(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Teaching tone</label>`;
    html += `<div class="radio-row" id="${c.id}_tone_g">`;
    ['Expert ("I teach you")','Friendly peer ("Let\'s learn")','Motivational coach','Relatable/casual'].forEach(o => {
        html += `<div class="radio-pill" data-g="${c.id}_tone" data-v="${o}" onclick="pickRadio(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>German quality (based on your 8 reels)</label>`;
    html += `<div class="radio-row" id="${c.id}_gerquality_g">`;
    ['No errors noticed','Minor slips only','Some grammar errors','Significant errors'].forEach(o => {
        html += `<div class="radio-pill" data-g="${c.id}_gerquality" data-v="${o}" onclick="pickRadio(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Sales approach</label>`;
    html += `<div class="radio-row" id="${c.id}_sales_g">`;
    ['Aggressive (constant CTAs)','Moderate','Soft (occasional)','None visible'].forEach(o => {
        html += `<div class="radio-pill" data-g="${c.id}_sales" data-v="${o}" onclick="pickRadio(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Topics covered (click all that apply)</label>`;
    html += `<div class="tag-group" id="${c.id}_topics_g">`;
    ['Vocabulary','Grammar','Pronunciation','Common mistakes','Cultural content','Motivation','Learning tips','Course promo','Exam prep'].forEach(o => {
        html += `<div class="tag" data-g="${c.id}_topics" data-v="${o}" onclick="toggleTag(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Authority signals used (click all that apply)</label>`;
    html += `<div class="tag-group" id="${c.id}_signals_g">`;
    ['Grammar terminology','Branded graphics','Professional look','Student testimonials','Experience claims','CEFR references','Face always visible','Consistent style'].forEach(o => {
        html += `<div class="tag" data-g="${c.id}_signals" data-v="${o}" onclick="toggleTag(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Connection / PSR techniques (click all that apply)</label>`;
    html += `<div class="tag-group" id="${c.id}_psrtags_g">`;
    ['Direct "you" address','Personal stories','Humor','Behind-the-scenes','Responds to comments','Shows vulnerability','Asks audience questions','Shares daily life'].forEach(o => {
        html += `<div class="tag on-style" data-g="${c.id}_psrtags" data-v="${o}" onclick="toggleTag(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `<div class="form-group"><label>Paid offerings visible (click all that apply)</label>`;
    html += `<div class="tag-group" id="${c.id}_offerings_g">`;
    ['Online courses','E-books/PDFs','Private lessons','Group classes','Membership','Book','Affiliate links','Sponsored content'].forEach(o => {
        html += `<div class="tag" data-g="${c.id}_offerings" data-v="${o}" onclick="toggleTag(this)">${o}</div>`;
    });
    html += `</div></div>`;

    html += `</div>`;

    // Section 5: Free-form assessment
    html += `<div class="card"><h2>Step 4: Your Assessment (write freely)</h2>`;
    html += `<p class="hint">These are the most important fields - your own analysis in your own words.</p>`;

    html += `<div class="form-group"><label>How does this creator construct their authority as a teacher?</label>`;
    html += `<textarea id="${c.id}_authority" class="big" onchange="autoSave()" placeholder="How do they convince followers they're qualified? What signals do they use? Do they mention credentials, experience, student numbers? How does their visual style support this?"></textarea></div>`;

    html += `<div class="form-group"><label>Quality of German teaching & educational value</label>`;
    html += `<textarea id="${c.id}_quality" onchange="autoSave()" placeholder="Is the German correct? Is the teaching effective? Would a learner actually learn from this? Any errors or misleading explanations?"></textarea></div>`;

    html += `<div class="form-group"><label>Parasocial relationship building</label>`;
    html += `<textarea id="${c.id}_psr" onchange="autoSave()" placeholder="How do they create a personal connection? Humor, vulnerability, direct address, personal stories? Does it feel like a friend or a teacher?"></textarea></div>`;

    html += `<div class="form-group"><label>Commercial model & selling approach</label>`;
    html += `<textarea id="${c.id}_selling" onchange="autoSave()" placeholder="How do they monetize? How pushy is the selling? Is it integrated into content or separate? Does the free content serve as a funnel?"></textarea></div>`;

    html += `<div class="form-group"><label>Overall impression & anything else</label>`;
    html += `<textarea id="${c.id}_freeform" class="big" onchange="autoSave()" placeholder="Your gut feeling about this creator. What surprised you? How do they compare to others? What would you tell someone considering learning German from them? Anything else worth noting."></textarea></div>`;

    html += `</div></div>`;
});

mainEl.innerHTML = html;

// Tabs
CREATORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab'; btn.id = `tab-${c.id}`;
    btn.onclick = () => showTab(c.id);
    btn.innerHTML = `${c.handle} <span class="st" id="st-${c.id}"></span>`;
    tabsEl.appendChild(btn);
});

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pickRadio(el) {
    const g = el.dataset.g;
    document.querySelectorAll(`[data-g="${g}"]`).forEach(e => e.classList.remove('on'));
    el.classList.add('on');
    autoSave();
}

function toggleTag(el) {
    el.classList.toggle('on');
    autoSave();
}

function showTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if (id === 'overview') {
        document.querySelector('.tabs .tab:first-child').classList.add('active');
    } else {
        document.getElementById('tab-' + id).classList.add('active');
    }
    document.getElementById('panel-' + id).classList.add('active');
    updateProgress();
}

// ===== DATA =====
const TEXT_FIELDS = ['bio','followers','posts','authority','quality','psr','selling','freeform'];
const REEL_FIELDS = ['date','topic','notes','engagement'];
const RADIO_GROUPS = ['lang','tone','gerquality','sales'];
const TAG_GROUPS = ['topics','signals','psrtags','offerings'];

function collectData() {
    const data = {};
    CREATORS.forEach(c => {
        data[c.id] = {};
        // Text fields
        TEXT_FIELDS.forEach(f => {
            const el = document.getElementById(`${c.id}_${f}`);
            if (el) data[c.id][f] = el.value;
        });
        // Reels
        for (let i = 1; i <= 8; i++) {
            REEL_FIELDS.forEach(f => {
                const el = document.getElementById(`${c.id}_r${i}_${f}`);
                if (el) data[c.id][`r${i}_${f}`] = el.value;
            });
        }
        // Radio pills
        RADIO_GROUPS.forEach(g => {
            const sel = document.querySelector(`[data-g="${c.id}_${g}"].on`);
            data[c.id][g] = sel ? sel.dataset.v : '';
        });
        // Tags (multi-select)
        TAG_GROUPS.forEach(g => {
            const selected = [];
            document.querySelectorAll(`[data-g="${c.id}_${g}"].on`).forEach(el => selected.push(el.dataset.v));
            data[c.id][g] = selected;
        });
    });
    return data;
}

function applyData(data) {
    CREATORS.forEach(c => {
        if (!data[c.id]) return;
        // Text fields
        TEXT_FIELDS.forEach(f => {
            const el = document.getElementById(`${c.id}_${f}`);
            if (el && data[c.id][f]) el.value = data[c.id][f];
        });
        // Reels
        for (let i = 1; i <= 8; i++) {
            REEL_FIELDS.forEach(f => {
                const el = document.getElementById(`${c.id}_r${i}_${f}`);
                if (el && data[c.id][`r${i}_${f}`]) el.value = data[c.id][`r${i}_${f}`];
            });
        }
        // Radio pills
        RADIO_GROUPS.forEach(g => {
            const val = data[c.id][g];
            if (val) {
                document.querySelectorAll(`[data-g="${c.id}_${g}"]`).forEach(el => {
                    if (el.dataset.v === val) el.classList.add('on');
                });
            }
        });
        // Tags
        TAG_GROUPS.forEach(g => {
            const vals = data[c.id][g];
            if (vals && Array.isArray(vals)) {
                vals.forEach(v => {
                    document.querySelectorAll(`[data-g="${c.id}_${g}"]`).forEach(el => {
                        if (el.dataset.v === v) el.classList.add('on');
                    });
                });
            }
        });
    });
    updateProgress();
}

function getCompletion(cid) {
    let total = 0, filled = 0;
    // Bio + followers + posts = 3
    ['bio','followers','posts'].forEach(f => {
        total++;
        const el = document.getElementById(`${cid}_${f}`);
        if (el && el.value.trim()) filled++;
    });
    // 8 reels (notes filled) = 8
    for (let i = 1; i <= 8; i++) {
        total++;
        const el = document.getElementById(`${cid}_r${i}_notes`);
        if (el && el.value.trim()) filled++;
    }
    // 4 radio groups = 4
    RADIO_GROUPS.forEach(g => {
        total++;
        if (document.querySelector(`[data-g="${cid}_${g}"].on`)) filled++;
    });
    // 4 tag groups (at least 1 selected) = 4
    TAG_GROUPS.forEach(g => {
        total++;
        if (document.querySelector(`[data-g="${cid}_${g}"].on`)) filled++;
    });
    // 5 assessment text fields
    ['authority','quality','psr','selling','freeform'].forEach(f => {
        total++;
        const el = document.getElementById(`${cid}_${f}`);
        if (el && el.value.trim()) filled++;
    });
    return total > 0 ? Math.round((filled / total) * 100) : 0;
}

function updateProgress() {
    CREATORS.forEach(c => {
        const p = getCompletion(c.id);
        const bar = document.getElementById(`prog-${c.id}`);
        const txt = document.getElementById(`progtxt-${c.id}`);
        const obar = document.getElementById(`oprog-${c.id}`);
        if (bar) bar.style.width = p + '%';
        if (txt) txt.textContent = p + '%';
        if (obar) obar.style.width = p + '%';
        const st = document.getElementById(`st-${c.id}`);
        if (st) { st.className = 'st'; if (p === 100) st.classList.add('done'); else if (p > 0) st.classList.add('partial'); }
    });
}

let saveTimer = null;
function autoSave() {
    localStorage.setItem('thesis_data', JSON.stringify(collectData()));
    updateProgress();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { if (ghToken) syncToGithub(); }, 15000);
}

function exportJSON() {
    const d = collectData(); d._exportDate = new Date().toISOString(); d._research = RESEARCH;
    const b = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b);
    const a = document.createElement('a'); a.href = u; a.download = 'creator_analysis.json'; a.click();
    URL.revokeObjectURL(u);
}

function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== INIT =====
const saved = localStorage.getItem('thesis_data');
if (saved) { try { applyData(JSON.parse(saved)); } catch(e){} }
updateProgress();

if (ghToken) { syncFromGithub(); }
else { setSyncStatus('pending', 'Not connected'); showSetup(); }
</script>
