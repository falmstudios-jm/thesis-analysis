<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Analysis - Jonas Thesis</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
            --accent: #38bdf8; --accent2: #818cf8; --green: #4ade80;
            --text: #e2e8f0; --muted: #94a3b8; --border: #475569;
            --red: #f87171; --yellow: #fbbf24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 24px; position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .header h1 { font-size: 1.3em; color: var(--accent); }
        .header p { font-size: 0.82em; color: var(--muted); margin-top: 2px; }
        .header-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .sync-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 6px; font-size: 0.78em; font-weight: 600;
        }
        .sync-status.ok { background: rgba(74,222,128,0.15); color: var(--green); }
        .sync-status.pending { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .sync-status.error { background: rgba(248,113,113,0.15); color: var(--red); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
        .sync-status.ok .sync-dot { background: var(--green); }
        .sync-status.pending .sync-dot { background: var(--yellow); }
        .sync-status.error .sync-dot { background: var(--red); }

        .tabs {
            display: flex; gap: 4px; padding: 12px 24px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            overflow-x: auto; position: sticky; top: 90px; z-index: 99;
        }
        .tab {
            padding: 10px 16px; background: transparent; border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; border-radius: 8px;
            font-size: 0.83em; white-space: nowrap; transition: all 0.2s;
        }
        .tab:hover { background: var(--surface2); color: var(--text); }
        .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
        .tab .st { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 5px; }
        .tab .st.done { background: var(--green); }
        .tab .st.partial { background: var(--yellow); }

        .container { max-width: 960px; margin: 0 auto; padding: 24px; }

        .creator-panel { display: none; }
        .creator-panel.active { display: block; }

        .section {
            background: var(--surface); border-radius: 12px; padding: 24px;
            margin-bottom: 16px; border: 1px solid var(--border);
        }
        .section-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            cursor: pointer; user-select: none;
        }
        .section-header h2 { font-size: 1.05em; color: var(--accent); }
        .section-num {
            background: var(--accent); color: var(--bg); width: 26px; height: 26px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.8em; font-weight: 700; flex-shrink: 0;
        }
        .section-toggle { margin-left: auto; color: var(--muted); font-size: 1.2em; }
        .section-body.collapsed { display: none; }

        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 0.85em; font-weight: 500; }
        .required::after { content: ' *'; color: var(--red); }

        input[type="text"], input[type="number"], input[type="date"], textarea, select {
            width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.9em; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
        textarea { min-height: 80px; resize: vertical; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }

        .checks { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
        .check-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            background: var(--bg); border-radius: 6px; cursor: pointer; font-size: 0.88em;
        }
        .check-item:hover { background: var(--surface2); }
        .check-item input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

        .radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .radio-item {
            padding: 8px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
        }
        .radio-item:hover { border-color: var(--accent); }
        .radio-item.selected { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .btn {
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 0.85em; font-weight: 600; transition: all 0.2s;
        }
        .btn-accent { background: var(--accent); color: var(--bg); }
        .btn-accent:hover { filter: brightness(1.1); }
        .btn-green { background: var(--green); color: var(--bg); }
        .btn-green:hover { filter: brightness(1.1); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }

        .progress { background: var(--bg); border-radius: 10px; height: 6px; margin: 8px 0; overflow: hidden; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
            border-radius: 10px; transition: width 0.4s;
        }
        .progress-text { font-size: 0.8em; color: var(--muted); text-align: right; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            background: var(--green); color: var(--bg); border-radius: 8px;
            font-weight: 600; font-size: 0.9em; opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .toast.err { background: var(--red); }

        .prefilled { border-left: 3px solid var(--accent2) !important; }
        .prefilled-badge {
            display: inline-block; padding: 2px 6px; background: var(--accent2);
            color: white; border-radius: 4px; font-size: 0.7em; margin-left: 6px;
        }

        .overview-panel { display: none; }
        .overview-panel.active { display: block; }
        .overview-card {
            background: var(--surface); border-radius: 12px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 12px;
        }
        .overview-card h3 { color: var(--accent); margin-bottom: 8px; font-size: 1em; }

        .setup-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .setup-box {
            background: var(--surface); border-radius: 16px; padding: 32px;
            max-width: 500px; width: 100%; border: 1px solid var(--border);
        }
        .setup-box h2 { color: var(--accent); margin-bottom: 8px; }
        .setup-box p { color: var(--muted); font-size: 0.9em; margin-bottom: 16px; line-height: 1.5; }
        .setup-box input { margin-bottom: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="setup-modal hidden" id="setupModal">
    <div class="setup-box">
        <h2>Connect to GitHub</h2>
        <p>Enter a GitHub Personal Access Token to save data directly to the repo. The token needs <strong>repo</strong> scope.<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=thesis-analysis" target="_blank" style="color:var(--accent)">Create token here</a></p>
        <div class="form-group">
            <label>GitHub Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-accent" onclick="saveToken()">Connect</button>
            <button class="btn btn-ghost" onclick="skipToken()">Use Offline Only</button>
        </div>
    </div>
</div>

<div class="header">
    <div class="header-top">
        <div>
            <h1>Creator Analysis Tool</h1>
            <p>Jonas Martens - BA Thesis: Polish German-Teaching Creators on Instagram</p>
        </div>
        <div class="sync-status pending" id="syncStatus">
            <span class="sync-dot"></span>
            <span id="syncText">Checking...</span>
        </div>
    </div>
    <div class="header-actions">
        <button class="btn btn-green" onclick="syncToGithub()">Save to GitHub</button>
        <button class="btn btn-accent" onclick="syncFromGithub()">Load from GitHub</button>
        <button class="btn btn-ghost" onclick="exportJSON()">Export JSON</button>
        <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">Import</button>
        <button class="btn btn-ghost" onclick="showSetup()">Settings</button>
        <button class="btn btn-red" onclick="clearAll()">Reset</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
</div>

<div class="tabs" id="tabs">
    <button class="tab active" onclick="showTab('overview')">Overview</button>
</div>

<div class="container">
    <div id="overview-panel" class="overview-panel active">
        <div class="overview-card">
            <h3>Overall Progress</h3>
            <div class="progress"><div class="progress-fill" id="overall-progress" style="width:0%"></div></div>
            <div class="progress-text" id="overall-progress-text">0% complete</div>
        </div>
        <div id="overview-cards"></div>
    </div>
    <div id="panels"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const REPO_OWNER = 'falmstudios-jm';
const REPO_NAME = 'thesis-analysis';
const DATA_FILE = 'data.json';
const BRANCH = 'master';

// ===== CREATORS =====
const CREATORS = [
    { id: 'paula', handle: '@deutsch.frag.paula', name: 'Paulina Boinska' },
    { id: 'ania', handle: '@ania_germania', name: 'Anna Mazurek' },
    { id: 'lucy', handle: '@deutsch.mit.lucy', name: '\u0141ucja B\u0142aszczyk' },
    { id: 'olivia', handle: '@_szprechaj', name: 'Olivia Miku\u0142a' },
    { id: 'natalia', handle: '@niemieckizprzyjemnoscia', name: 'Natalia Kamysz' }
];

// ===== SECTIONS =====
const SECTIONS = [
    { num: 1, title: 'Profile & Bio', fields: [
        { id: 'handle', label: 'Instagram Handle', type: 'text', required: true },
        { id: 'name', label: 'Full Name', type: 'text', required: true },
        { id: 'analysis_date', label: 'Date of Analysis', type: 'date' },
        { id: 'follower_count', label: 'Follower Count (Instagram)', type: 'number' },
        { id: 'total_posts', label: 'Total Posts', type: 'number' },
        { id: 'bio_text', label: 'Exact Bio Text (copy verbatim from Instagram)', type: 'textarea', required: true },
        { id: 'bio_languages', label: 'Languages Used in Bio', type: 'checks', options: ['Polish','German','English','Other'] },
        { id: 'bio_contains', label: 'Bio Contains', type: 'checks', options: [
            'Credential claims','Experience claims','Native speaker claim','Student/client counts',
            'Link to paid content','Other platforms mentioned','Email for contact','Hashtags'
        ]},
        { id: 'other_platforms', label: 'Other Platforms & Links (TikTok, YouTube, website - include follower counts)', type: 'textarea' },
        { id: 'tiktok_handle', label: 'TikTok Handle', type: 'text' },
        { id: 'tiktok_followers', label: 'TikTok Followers', type: 'number' },
        { id: 'youtube_handle', label: 'YouTube Channel', type: 'text' },
        { id: 'youtube_subscribers', label: 'YouTube Subscribers', type: 'number' },
        { id: 'website_url', label: 'Website URL', type: 'text' },
    ]},
    { num: 2, title: 'Credential Claims', fields: [
        { id: 'explicit_claims', label: 'Explicit Claims (one per line: Claim | Exact Quote | Verifiable? Yes/No)', type: 'textarea' },
        { id: 'implicit_claims', label: 'Implicit Claims (one per line: What\'s Implied | How It\'s Suggested)', type: 'textarea' },
        { id: 'missing_credentials', label: 'Credentials NOT Mentioned (notable absences)', type: 'checks', options: [
            'University degree in German','Teaching certification (TEFL/DaF)',
            'Goethe-Institut certification','CEFR level achieved',
            'Academic publications','Formal employment (school/university)'
        ]},
    ]},
    { num: 3, title: 'Authority Construction', fields: [
        { id: 'visual_presentation', label: 'Visual Presentation', type: 'checks', options: [
            'Professional appearance','Casual/relatable appearance','Studio setting','Home setting',
            'Branded graphics','Consistent color scheme','Face visible in most content'
        ]},
        { id: 'visual_notes', label: 'Notes on Visual Presentation', type: 'textarea' },
        { id: 'language_used', label: 'Language Used in Content', type: 'radio', options: [
            'Predominantly Polish','Predominantly German','Mix of both','English elements'
        ]},
        { id: 'tone_of_address', label: 'Tone of Address', type: 'radio', options: [
            'Expert/authoritative ("I\'ll teach you...")','Peer/friendly ("Let\'s learn together...")',
            'Humble ("I\'m still learning too...")','Other'
        ]},
        { id: 'tone_notes', label: 'If "Other" tone, describe:', type: 'text' },
        { id: 'expertise_markers', label: 'Expertise Markers Used', type: 'checks', options: [
            'Technical grammar terminology','References to linguistic rules','Comparison with other languages',
            'Cultural explanations','Common mistake corrections','CEFR level references','Test preparation content'
        ]},
    ]},
    { num: 4, title: 'Content Sample', fields: [
        { id: 'sample_size', label: 'Number of Posts Analyzed', type: 'number' },
        { id: 'date_from', label: 'Sample Date Range - From', type: 'date' },
        { id: 'date_to', label: 'Sample Date Range - To', type: 'date' },
        { id: 'content_reels', label: 'Reels/Videos Count', type: 'number' },
        { id: 'content_images', label: 'Static Images Count', type: 'number' },
        { id: 'content_carousels', label: 'Carousels Count', type: 'number' },
        { id: 'content_highlights', label: 'Stories Highlights Count', type: 'number' },
        { id: 'topics_covered', label: 'Topics Covered', type: 'checks', options: [
            'Vocabulary','Grammar','Pronunciation','Common mistakes','Cultural content',
            'Motivation/mindset','Learning tips','Course promotion','Other'
        ]},
        { id: 'errors_observed', label: 'Errors Observed (one per line: Post Description | Error | Type)', type: 'textarea' },
        { id: 'quality_assessment', label: 'Overall Quality Assessment', type: 'radio', options: [
            'No errors observed','Minor errors (typos)','Some errors (grammar mistakes)','Significant errors'
        ]},
        { id: 'accuracy_notes', label: 'Notes on Teaching Accuracy', type: 'textarea' },
    ]},
    { num: 5, title: 'Engagement Analysis', fields: [
        { id: 'avg_likes', label: 'Average Likes (across sample)', type: 'number' },
        { id: 'avg_comments', label: 'Average Comments (across sample)', type: 'number' },
        { id: 'engagement_rate', label: 'Engagement Rate %', type: 'text' },
        { id: 'comment_types', label: 'Types of Comments Observed', type: 'checks', options: [
            'Praise/thanks','Questions about German','Corrections from viewers',
            'Requests for topics','Testimonials','Off-topic'
        ]},
        { id: 'response_pattern', label: 'Creator\'s Response Pattern', type: 'radio', options: [
            'Responds to most comments','Responds selectively','Rarely responds'
        ]},
        { id: 'response_style', label: 'Response Style', type: 'checks', options: [
            'Uses emojis/brief replies','Gives detailed answers'
        ]},
        { id: 'handles_corrections', label: 'How Creator Handles Corrections', type: 'textarea' },
    ]},
    { num: 6, title: 'Commercial Model', fields: [
        { id: 'paid_offerings', label: 'Paid Offerings Identified', type: 'checks', options: [
            'Online courses','E-books/PDFs','Private lessons','Group classes',
            'Membership/subscription','Affiliate links','Sponsored content','Merchandise'
        ]},
        { id: 'pricing', label: 'Pricing Information (if visible)', type: 'textarea' },
        { id: 'sales_approach', label: 'Sales Approach', type: 'radio', options: [
            'Aggressive (frequent CTAs, urgency)','Moderate (regular but not pushy)',
            'Soft (occasional mentions)','None visible'
        ]},
    ]},
    { num: 7, title: 'Parasocial Relationship (PSR)', fields: [
        { id: 'self_disclosure', label: 'Self-Disclosure - What personal info does creator share?', type: 'checks', options: [
            'Learning journey','Personal life','Struggles/failures','Success stories',
            'Daily routines','Family/relationships','Other'
        ]},
        { id: 'connection_building', label: 'Connection Building Techniques', type: 'checks', options: [
            'Uses "you" directly','Asks questions to audience','Responds to DMs',
            'Shows behind-the-scenes','Admits mistakes','Shows vulnerability','Uses humor'
        ]},
        { id: 'consistency', label: 'Consistency', type: 'checks', options: [
            'Consistent posting schedule','Consistent persona/style','Regular series/features','Reliable presence'
        ]},
    ]},
    { num: 8, title: 'Summary Assessment', fields: [
        { id: 'authority_strategy', label: 'Authority Construction Strategy (1-2 sentences)', type: 'textarea', required: true },
        { id: 'strongest_signal', label: 'Strongest Authority Signal', type: 'textarea' },
        { id: 'weakest_aspect', label: 'Weakest Authority Aspect', type: 'textarea' },
        { id: 'key_quote', label: 'Key Quote/Example (for thesis use)', type: 'textarea' },
        { id: 'research_connection', label: 'Connection to Research Question', type: 'textarea', required: true },
        { id: 'compare_credentials', label: 'vs. Others: Credentials', type: 'radio', options: ['More','Less','Same'] },
        { id: 'compare_authority', label: 'vs. Others: Authority Signals', type: 'radio', options: ['Stronger','Weaker','Similar'] },
        { id: 'compare_quality', label: 'vs. Others: German Quality', type: 'radio', options: ['Better','Worse','Similar'] },
        { id: 'compare_commercial', label: 'vs. Others: Commercial Model', type: 'radio', options: ['More','Less','Similar'] },
        { id: 'compare_psr', label: 'vs. Others: PSR Elements', type: 'radio', options: ['Stronger','Weaker','Similar'] },
    ]},
];

// ===== GITHUB SYNC =====
let ghToken = localStorage.getItem('gh_token') || '';
let fileSha = null;

function getHeaders() {
    return { 'Authorization': 'token ' + ghToken, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}

async function syncFromGithub() {
    if (!ghToken) { showSetup(); return; }
    setSyncStatus('pending', 'Loading...');
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}?ref=${BRANCH}`, { headers: getHeaders() });
        if (res.status === 404) { setSyncStatus('ok', 'No saved data yet'); return; }
        if (!res.ok) throw new Error('GitHub API error: ' + res.status);
        const json = await res.json();
        fileSha = json.sha;
        const content = JSON.parse(atob(json.content.replace(/\n/g, '')));
        localStorage.setItem('thesis_creator_data', JSON.stringify(content));
        applyData(content);
        setSyncStatus('ok', 'Loaded from GitHub');
        showToast('Loaded from GitHub');
    } catch (e) {
        setSyncStatus('error', 'Load failed');
        showToast('Error: ' + e.message, true);
    }
}

async function syncToGithub() {
    if (!ghToken) { showSetup(); return; }
    const data = collectData();
    data._lastSaved = new Date().toISOString();
    setSyncStatus('pending', 'Saving...');
    try {
        // Get current sha first
        const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}?ref=${BRANCH}`, { headers: getHeaders() });
        if (getRes.ok) { fileSha = (await getRes.json()).sha; }
        else if (getRes.status !== 404) throw new Error('GitHub API error: ' + getRes.status);

        const body = {
            message: 'Update creator analysis data - ' + new Date().toLocaleString(),
            content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
            branch: BRANCH
        };
        if (fileSha) body.sha = fileSha;

        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
            method: 'PUT', headers: getHeaders(), body: JSON.stringify(body)
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.message || res.status); }
        const result = await res.json();
        fileSha = result.content.sha;
        setSyncStatus('ok', 'Saved to GitHub');
        showToast('Saved to GitHub!');
    } catch (e) {
        setSyncStatus('error', 'Save failed');
        showToast('Error: ' + e.message, true);
    }
}

function setSyncStatus(state, text) {
    const el = document.getElementById('syncStatus');
    const textEl = document.getElementById('syncText');
    el.className = 'sync-status ' + state;
    textEl.textContent = text;
}

function showSetup() { document.getElementById('setupModal').classList.remove('hidden'); }
function saveToken() {
    ghToken = document.getElementById('tokenInput').value.trim();
    if (ghToken) {
        localStorage.setItem('gh_token', ghToken);
        document.getElementById('setupModal').classList.add('hidden');
        syncFromGithub();
    }
}
function skipToken() {
    document.getElementById('setupModal').classList.add('hidden');
    setSyncStatus('pending', 'Offline mode');
}

// ===== BUILD UI =====
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

CREATORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab'; btn.id = `tab-${c.id}`;
    btn.onclick = () => showTab(c.id);
    btn.innerHTML = `${c.handle} <span class="st" id="st-${c.id}"></span>`;
    tabsEl.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'creator-panel'; panel.id = `panel-${c.id}`;
    panel.innerHTML = buildForm(c);
    panelsEl.appendChild(panel);
});

function buildForm(c) {
    let h = `<h2 style="margin-bottom:16px;color:var(--accent)">${c.name} <span style="color:var(--muted);font-weight:400">${c.handle}</span></h2>`;
    h += `<div class="progress"><div class="progress-fill" id="prog-${c.id}" style="width:0%"></div></div>`;
    h += `<div class="progress-text" id="progtxt-${c.id}">0%</div>`;
    SECTIONS.forEach(s => {
        h += `<div class="section"><div class="section-header" onclick="tog('${c.id}-s${s.num}')">`;
        h += `<span class="section-num">${s.num}</span><h2>${s.title}</h2>`;
        h += `<span class="section-toggle" id="tgl-${c.id}-s${s.num}">-</span></div>`;
        h += `<div class="section-body" id="bd-${c.id}-s${s.num}">`;
        s.fields.forEach(f => {
            const fid = `${c.id}_${f.id}`;
            h += `<div class="form-group"><label class="${f.required?'required':''}">${f.label}</label>`;
            if (f.type==='text'||f.type==='number'||f.type==='date') {
                h += `<input type="${f.type}" id="${fid}" data-f="${f.id}" data-c="${c.id}" onchange="autoSave()">`;
            } else if (f.type==='textarea') {
                h += `<textarea id="${fid}" data-f="${f.id}" data-c="${c.id}" onchange="autoSave()"></textarea>`;
            } else if (f.type==='checks') {
                h += `<div class="checks">`;
                f.options.forEach(o => {
                    h += `<label class="check-item"><input type="checkbox" id="${fid}_${slug(o)}" data-f="${f.id}" data-o="${o}" data-c="${c.id}" onchange="autoSave()"> ${o}</label>`;
                });
                h += `</div>`;
            } else if (f.type==='radio') {
                h += `<div class="radio-group" id="${fid}_g">`;
                f.options.forEach(o => {
                    h += `<div class="radio-item" data-f="${f.id}" data-o="${o}" data-c="${c.id}" onclick="selRadio(this)">${o}</div>`;
                });
                h += `</div>`;
            }
            h += `</div>`;
        });
        h += `</div></div>`;
    });
    return h;
}

function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/_+$/,''); }

function selRadio(el) {
    el.parentElement.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected'); autoSave();
}

function tog(id) {
    const b = document.getElementById('bd-'+id);
    const t = document.getElementById('tgl-'+id);
    b.classList.toggle('collapsed');
    t.textContent = b.classList.contains('collapsed') ? '+' : '-';
}

let activeTab = 'overview';
function showTab(id) {
    activeTab = id;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.creator-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('overview-panel').classList.remove('active');
    if (id==='overview') {
        document.querySelector('.tabs .tab:first-child').classList.add('active');
        document.getElementById('overview-panel').classList.add('active');
        updateOverview();
    } else {
        document.getElementById('tab-'+id).classList.add('active');
        document.getElementById('panel-'+id).classList.add('active');
    }
}

// ===== DATA =====
function collectData() {
    const data = {};
    CREATORS.forEach(c => {
        data[c.id] = { handle: c.handle, name: c.name };
        SECTIONS.forEach(s => s.fields.forEach(f => {
            const fid = `${c.id}_${f.id}`;
            if (f.type==='text'||f.type==='number'||f.type==='date'||f.type==='textarea') {
                const el = document.getElementById(fid);
                if (el) data[c.id][f.id] = el.value;
            } else if (f.type==='checks') {
                const arr = [];
                f.options.forEach(o => {
                    const cb = document.getElementById(`${fid}_${slug(o)}`);
                    if (cb && cb.checked) arr.push(o);
                });
                data[c.id][f.id] = arr;
            } else if (f.type==='radio') {
                const sel = document.querySelector(`#${fid}_g .radio-item.selected`);
                data[c.id][f.id] = sel ? sel.dataset.o : '';
            }
        }));
    });
    return data;
}

function applyData(data) {
    CREATORS.forEach(c => {
        if (!data[c.id]) return;
        SECTIONS.forEach(s => s.fields.forEach(f => {
            const fid = `${c.id}_${f.id}`;
            const val = data[c.id][f.id];
            if (val === undefined) return;
            if (f.type==='text'||f.type==='number'||f.type==='date'||f.type==='textarea') {
                const el = document.getElementById(fid);
                if (el) el.value = val;
            } else if (f.type==='checks' && Array.isArray(val)) {
                val.forEach(o => {
                    const cb = document.getElementById(`${fid}_${slug(o)}`);
                    if (cb) cb.checked = true;
                });
            } else if (f.type==='radio' && val) {
                document.querySelectorAll(`#${fid}_g .radio-item`).forEach(item => {
                    if (item.dataset.o === val) item.classList.add('selected');
                });
            }
        }));
    });
    updateProgress();
}

let saveTimer = null;
function autoSave() {
    localStorage.setItem('thesis_creator_data', JSON.stringify(collectData()));
    updateProgress();
    // Debounced auto-sync to GitHub
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
        if (ghToken) syncToGithub();
    }, 10000); // sync after 10s of inactivity
}

function getCompletion(cid) {
    let t = 0, f = 0;
    SECTIONS.forEach(s => s.fields.forEach(field => {
        t++;
        const fid = `${cid}_${field.id}`;
        if (field.type==='text'||field.type==='number'||field.type==='date'||field.type==='textarea') {
            const el = document.getElementById(fid);
            if (el && el.value.trim()) f++;
        } else if (field.type==='checks') {
            let any = false;
            field.options.forEach(o => { const cb = document.getElementById(`${fid}_${slug(o)}`); if (cb&&cb.checked) any=true; });
            if (any) f++;
        } else if (field.type==='radio') {
            if (document.querySelector(`#${fid}_g .radio-item.selected`)) f++;
        }
    }));
    return t > 0 ? Math.round((f/t)*100) : 0;
}

function updateProgress() {
    let total = 0;
    CREATORS.forEach(c => {
        const p = getCompletion(c.id);
        total += p;
        const bar = document.getElementById(`prog-${c.id}`);
        const txt = document.getElementById(`progtxt-${c.id}`);
        if (bar) bar.style.width = p+'%';
        if (txt) txt.textContent = p+'%';
        const st = document.getElementById(`st-${c.id}`);
        if (st) { st.className = 'st'; if (p===100) st.classList.add('done'); else if (p>0) st.classList.add('partial'); }
    });
    const avg = Math.round(total/CREATORS.length);
    const ob = document.getElementById('overall-progress');
    const ot = document.getElementById('overall-progress-text');
    if (ob) ob.style.width = avg+'%';
    if (ot) ot.textContent = avg+'% complete';
}

function updateOverview() {
    let h = '';
    CREATORS.forEach(c => {
        const p = getCompletion(c.id);
        h += `<div class="overview-card"><h3>${c.name} <span style="color:var(--muted);font-weight:400">${c.handle}</span></h3>
        <div class="progress"><div class="progress-fill" style="width:${p}%"></div></div>
        <div class="progress-text">${p}%</div>
        <button class="btn btn-accent" style="margin-top:8px" onclick="showTab('${c.id}')">Edit</button></div>`;
    });
    document.getElementById('overview-cards').innerHTML = h;
}

function exportJSON() {
    const d = collectData(); d._exportDate = new Date().toISOString();
    const b = new Blob([JSON.stringify(d,null,2)], {type:'application/json'});
    dl(b, 'creator_analysis_'+new Date().toISOString().slice(0,10)+'.json');
}

function exportCSV() {
    const d = collectData();
    const fields = [];
    SECTIONS.forEach(s => s.fields.forEach(f => { if (!fields.includes(f.id)) fields.push(f.id); }));
    let csv = 'creator,' + fields.join(',') + '\n';
    CREATORS.forEach(c => {
        const row = [c.id];
        fields.forEach(fid => {
            let v = d[c.id][fid]; if (Array.isArray(v)) v = v.join('; ');
            v = String(v||'').replace(/"/g,'""');
            if (v.includes(',')||v.includes('\n')||v.includes('"')) v = '"'+v+'"';
            row.push(v);
        });
        csv += row.join(',') + '\n';
    });
    dl(new Blob([csv],{type:'text/csv'}), 'creator_analysis_'+new Date().toISOString().slice(0,10)+'.csv');
}

function dl(blob, name) {
    const u = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = u; a.download = name; a.click();
    URL.revokeObjectURL(u);
}

function handleImport(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
        try {
            const d = JSON.parse(ev.target.result);
            localStorage.setItem('thesis_creator_data', JSON.stringify(d));
            applyData(d);
            showToast('Imported!');
        } catch(err) { alert('Invalid JSON'); }
    };
    r.readAsText(f);
}

function clearAll() {
    if (confirm('Delete ALL entered data? This cannot be undone.')) {
        localStorage.removeItem('thesis_creator_data');
        location.reload();
    }
}

function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== INIT =====
async function init() {
    const saved = localStorage.getItem('thesis_creator_data');
    if (saved) {
        try { applyData(JSON.parse(saved)); } catch(e){}
    } else {
        // No local data - try loading pre-filled data from data.json
        try {
            const res = await fetch('data.json');
            if (res.ok) {
                const prefill = await res.json();
                applyData(prefill);
                localStorage.setItem('thesis_creator_data', JSON.stringify(prefill));
                showToast('Pre-filled research data loaded');
            }
        } catch(e) { /* no prefill available */ }
    }
    updateOverview();

    if (ghToken) {
        syncFromGithub();
    } else {
        setSyncStatus('pending', 'Not connected');
        showSetup();
    }
}
init();
</script>
